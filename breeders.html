<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeders – PhenoBrasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
.hero { background: linear-gradient(135deg, #0d0d0d 0%, #1a2a1a 50%, #0d0d0d 100%); border-bottom: 1px solid var(--border); padding: 4rem 2rem; text-align: center; }
.hero h1 { font-family: 'Barlow Condensed'; font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800; text-transform: uppercase; line-height: 0.95; margin-bottom: 0.8rem; }
.hero h1 span { color: var(--gold); }
.hero p { color: var(--muted); font-size: 1rem; max-width: 400px; margin: 0 auto; }

.main-wrap { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
.section-head h2 { font-family: 'Barlow Condensed'; font-size: 1.6rem; font-weight: 800; text-transform: uppercase; }
.section-head h2 span { color: var(--gold); }
.total-count { font-size: 0.8rem; color: var(--muted); font-family: 'Barlow Condensed'; letter-spacing: 0.05em; }

.breeders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
.breeder-card { background: var(--bg2); border: 1px solid var(--border); padding: 2rem 1rem 1.5rem; border-radius: 4px; text-align: center; text-decoration: none; color: var(--white); transition: all 0.2s; display: block; }
.breeder-card:hover { border-color: var(--gold); transform: translateY(-3px); }
.breeder-card:hover .breeder-avatar { border-color: var(--gold); }
.breeder-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); margin: 0 auto 1rem; display: block; background: var(--bg3); transition: border-color 0.2s; }
.breeder-name { font-family: 'Barlow Condensed'; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.3rem; }
.breeder-count { font-size: 0.78rem; color: var(--muted); }
.breeder-count strong { color: var(--gold); font-family: 'Barlow Condensed'; font-size: 0.9rem; }
.state-msg { text-align: center; padding: 4rem 2rem; color: var(--muted); grid-column: 1/-1; }
@media (max-width: 480px) { .breeders-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<!-- NAV, MODAL, CARRINHO e FOOTER injetados pelo JS -->

<div class="hero">
  <h1>Nossos <span>Breeders</span></h1>
  <p>Conheça os cultivadores por trás das melhores genéticas nacionais.</p>
</div>

<div class="main-wrap">
  <div class="section-head">
    <h2>Todos os <span>Cultivadores</span></h2>
    <span class="total-count" id="total-count"></span>
  </div>
  <div class="breeders-grid" id="breeders-grid">
    <div class="state-msg">Carregando breeders...</div>
  </div>
</div>

<script type="module">
  import { renderNav } from './nav.js';
  import { initCarrinho } from './nav.js';
  import { initAuth } from './nav.js';
  import { renderFooter } from './footer.js';
  import { db } from './nav.js';
  import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Injeta nav, carrinho, modal e footer
  renderNav('Breeders');
  initCarrinho();
  initAuth();
  renderFooter();

  // Carrega breeders
  const grid = document.getElementById('breeders-grid');

  const carregar = async () => {
    try {
      const [breedersSnap, prodsSnap] = await Promise.all([
        getDocs(query(collection(db, "users"), where("role", "==", "breeder"))),
        getDocs(collection(db, "products"))
      ]);

      const contagem = {};
      prodsSnap.forEach(d => {
        const uid = d.data().breederUid;
        if (uid) contagem[uid] = (contagem[uid] || 0) + 1;
      });

      grid.innerHTML = '';

      if (breedersSnap.empty) {
        grid.innerHTML = '<div class="state-msg">Nenhum breeder cadastrado ainda.</div>';
        return;
      }

      document.getElementById('total-count').textContent =
        `${breedersSnap.size} breeder${breedersSnap.size !== 1 ? 's' : ''} cadastrado${breedersSnap.size !== 1 ? 's' : ''}`;

      breedersSnap.forEach(docSnap => {
        const b   = docSnap.data();
        const nome   = b.name || 'Breeder';
        const qtd    = contagem[docSnap.id] || 0;
        const avatar = b.photo ||
          `https://ui-avatars.com/api/?name=${encodeURIComponent(nome)}&background=3a7d44&color=fff&size=160`;

        const card = document.createElement('a');
        card.className = 'breeder-card';
        card.href = `breeder-strains.html?id=${docSnap.id}`;
        card.innerHTML = `
          <img class="breeder-avatar" src="${avatar}" alt="${nome}">
          <div class="breeder-name">${nome}</div>
          <div class="breeder-count"><strong>${qtd}</strong> strain${qtd !== 1 ? 's' : ''}</div>`;
        grid.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      grid.innerHTML = '<div class="state-msg" style="color:var(--red)">Erro ao carregar breeders.</div>';
    }
  };

  carregar();
</script>
</body>
</html>
